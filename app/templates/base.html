<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Анализ брокерских отчетов{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f5f7fb; }
        .card { box-shadow: 0 2px 8px rgba(0,0,0,.08); border: none; margin-bottom: 1.5rem; }
        .card-header { font-weight: 600; }
        .table th { white-space: nowrap; }
        .profit-positive { color: #198754; font-weight: 600; }
        .profit-negative { color: #dc3545; font-weight: 600; }
        .bg-profit-pos { background-color: #d1e7dd; }
        .bg-profit-neg { background-color: #f8d7da; }
        .table td, .table th { white-space: nowrap; }
        .arrow-up { color: #198754; font-size: 14px; display: inline-block; vertical-align: middle; line-height: 1; }
        .arrow-down { color: #dc3545; font-size: 14px; display: inline-block; vertical-align: middle; line-height: 1; }
        .pl-cell { white-space: nowrap; display: inline-flex; align-items: center; gap: 2px; justify-content: flex-end; }
        .table-fixed { table-layout: fixed; }
        .table-fixed td, .table-fixed th { overflow: hidden; text-overflow: ellipsis; }
        .ref-table tbody { min-height: 180px; }
        .ref-table { width: 100%; }
        .navbar-brand { font-weight: 700; letter-spacing: -.5px; }
        .tkr { display: inline-flex; align-items: center; gap: 4px; }
        .tkr-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .tkr-logo { width: 16px; height: 16px; border-radius: 4px; vertical-align: middle; flex-shrink: 0; object-fit: contain; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-graph-up-arrow"></i> BrokerReport
            </a>
        </div>
    </nav>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} alert-dismissible fade show">{{ msg }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
